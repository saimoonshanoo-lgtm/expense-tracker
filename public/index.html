<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Finance Wallet</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg">
        
        <header class="bg-blue-600 text-white p-4 text-center">
            <h1 class="text-2xl font-bold">My Finance Wallet</h1>
        </header>

        <div class="p-4">
            <div class="mb-4 flex justify-end items-center">
                <label class="mr-2 font-bold text-gray-700 text-sm">Currency:</label>
                <select id="currency-select" onchange="changeCurrency(this.value)" class="border border-gray-300 rounded p-1 bg-white text-sm font-semibold">
                    <option value="USD">USD ($)</option>
                    <option value="THB">THB (฿)</option>
                    <option value="MMK">MMK (K)</option>
                </select>
            </div>

            <div class="grid grid-cols-3 gap-2 mb-6 text-center">
                <div class="bg-blue-50 p-3 rounded-lg shadow-sm border border-blue-100">
                    <p class="text-xs text-blue-600 font-bold uppercase">Today</p>
                    <p id="today-total" class="text-lg font-bold text-gray-800">$0.00</p>
                </div>
                <div class="bg-blue-50 p-3 rounded-lg shadow-sm border border-blue-100">
                    <p class="text-xs text-blue-600 font-bold uppercase">This Week</p>
                    <p id="week-total" class="text-lg font-bold text-gray-800">$0.00</p>
                </div>
                <div class="bg-blue-50 p-3 rounded-lg shadow-sm border border-blue-100">
                    <p class="text-xs text-blue-600 font-bold uppercase">This Month</p>
                    <p id="month-total" class="text-lg font-bold text-gray-800">$0.00</p>
                </div>
            </div>

            <div class="mb-6 bg-white p-2 rounded-lg border border-gray-200 shadow-sm">
                <canvas id="spendingChart"></canvas>
            </div>

            <div>
                <h2 class="text-lg font-bold mb-3 border-b pb-1 text-gray-700">Recent Expenses</h2>
                <ul id="expense-list" class="divide-y divide-gray-100">
                    </ul>
            </div>
        </div>
    </div>
