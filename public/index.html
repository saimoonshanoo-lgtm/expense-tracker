<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Money Manager</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg">
        
        <header class="bg-blue-600 text-white p-4 flex justify-between items-center">
            <h1 class="text-xl font-bold">My Money Manager</h1>
            <select id="currency-select" onchange="changeCurrency(this.value)" class="bg-blue-700 text-white border border-blue-500 rounded p-1 text-sm font-semibold outline-none">
                <option value="THB">THB (฿)</option>
                <option value="USD">USD ($)</option>
                <option value="MMK">MMK (K)</option>
            </select>
        </header>

        <div class="p-4">
            <div class="bg-gray-800 text-white p-5 rounded-xl shadow-md mb-4 text-center">
                <p class="text-sm text-gray-300 font-semibold uppercase tracking-wider mb-1">Total Net Balance</p>
                <p id="total-balance" class="text-3xl font-bold">฿0.00</p>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="bg-green-50 p-3 rounded-lg border border-green-100 text-center shadow-sm">
                    <p class="text-xs text-green-600 font-bold uppercase">Monthly Income</p>
                    <p id="month-income" class="text-lg font-bold text-green-600">+฿0.00</p>
                </div>
                <div class="bg-red-50 p-3 rounded-lg border border-red-100 text-center shadow-sm">
                    <p class="text-xs text-red-600 font-bold uppercase">Monthly Expenses</p>
                    <p id="month-expense" class="text-lg font-bold text-red-500">-฿0.00</p>
                </div>
            </div>

            <div class="mb-6 bg-white p-2 rounded-lg border border-gray-200 shadow-sm">
                <canvas id="spendingChart"></canvas>
            </div>

            <div>
                <h2 class="text-lg font-bold mb-3 border-b pb-1 text-gray-700">Recent Transactions</h2>
                <div id="expense-list" class="space-y-3">
                </div>
            </div>
        </div>
    </div>

</body>
</html>
